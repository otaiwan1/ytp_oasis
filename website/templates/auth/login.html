{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <div style="width: 56px; height: 56px; background: linear-gradient(135deg, var(--oasis-blue-400), var(--oasis-blue-600)); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <i class="bi bi-hexagon-fill" style="font-size: 1.5rem; color: white;"></i>
                </div>
                <h2 style="font-weight: 800; color: var(--oasis-gray-900); letter-spacing: -0.5px;">Welcome back</h2>
                <p style="color: var(--oasis-gray-500); font-size: 0.95rem;">Sign in to your OASIS account</p>
            </div>

            <div class="card-oasis p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label-oasis" for="username">Username</label>
                        <input type="text" class="form-control form-control-oasis" id="username" name="username" 
                               placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-oasis" for="password">Password</label>
                        <input type="password" class="form-control form-control-oasis" id="password" name="password" 
                               placeholder="Enter your password" required>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember" style="border-color: var(--oasis-gray-300);">
                            <label class="form-check-label" for="remember" style="font-size: 0.9rem; color: var(--oasis-gray-500);">Remember me</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-oasis w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
            </div>

            <p class="text-center mt-3" style="color: var(--oasis-gray-500); font-size: 0.9rem;">
                Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--oasis-blue-600); font-weight: 600; text-decoration: none;">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
